# Scenario: Midgame Pressure Probe (Orcs) — Depth 5 Canary
# Purpose: Early-warning diagnostic for runaway midgame pressure (depth 4–6).
#
# Design Intent:
#   This is a "pressure probe" (canary), not a balance baseline scenario.
#   It should remain stable across future content additions and only trip
#   when midgame pressure truly runs away due to composition + depth scaling.
#
# Load-bearing metrics (tracked, but not all enforced via expectations):
#   - player_deaths: Detects runaway pressure (expectation: <=30% death rate)
#   - player_kills: Ensures player usually wins (expectation: >=60% win rate)
#   - skirmisher_leaps_used: Validates skirmisher engages via leap
#   - skirmisher_fast_attacks_triggered: Validates fast pressure procs
#   - skirmisher_adjacent_turns: Measures skirmisher melee engagement
#
# Scenario is deterministic under seed_base=1337.

scenario_id: midgame_pressure_probe_orcs
name: "Midgame Pressure Probe (Orcs) — Depth 4 Canary"
description: "Depth 4 multi-orc encounter to detect runaway midgame pressure from composition + scaling"

# Dungeon depth (early midgame pressure zone)
# Using depth 4 instead of 5 to establish a viable baseline canary
# that detects runaway pressure without being unwinnable by default
depth: 4

# Defaults for harness runs
defaults:
  turn_limit: 120
  player_bot: "tactical_fighter"
  allow_player_death: true
  runs: 20

# Expected outcomes for validation (smoke-level, intentionally loose)
# These are runaway guardrails, not tuning targets.
# Baseline at depth 4 with 4-enemy composition yields ~50% death rate (10/20).
# Expectations set to detect runaway pressure (>70% death rate) while allowing
# natural difficulty variance.
# Supported expectation keys: min_player_kills, max_player_deaths, 
# plague_infections_min, reanimations_min, surprise_attacks_min, bonus_attacks_min
expected:
  min_player_kills: 40   # Player should kill most enemies across runs
  max_player_deaths: 14  # Allow up to 70% death rate; trips if pressure runs away further

# Note: Skirmisher metrics (leaps, fast_attacks, adjacent_turns) are tracked
# in aggregated metrics but not enforceable via expectations (harness limitation).
# Monitor these manually in run output to verify skirmisher identity expression.

# Room definitions - open arena to avoid pathing brittleness
rooms:
  - id: "midgame_pressure_arena"
    type: "arena"
    width: 16
    height: 12
    description: "Open arena for midgame pressure testing (depth 4)"
    walls: "enclosed"

# Monster placements - explicit orc IDs (NOT generic "orc")
# Composition: 1x grunt, 1x brute, 1x shaman, 1x skirmisher (4 total)
# Reduced from 5 to 4 enemies to achieve viable but challenging pressure
# state: "in_combat" ensures monsters are aware and engage immediately
monsters:
  # One orc grunt (baseline melee)
  - type: "orc_grunt"
    count: 1
    position: [10, 6]
    facing: "west"
    state: "in_combat"
  
  # One orc brute (tanky melee)
  - type: "orc_brute"
    count: 1
    position: [12, 7]
    facing: "west"
    state: "in_combat"
  
  # One orc shaman (ranged caster)
  - type: "orc_shaman"
    count: 1
    position: [13, 5]
    facing: "west"
    state: "in_combat"
  
  # One orc skirmisher (leap + fast pressure)
  # Positioned at Chebyshev distance ~7 from player (3,6) to enable leap
  # Player at (3,6), skirmisher at (10,5) = distance 7
  - type: "orc_skirmisher"
    count: 1
    position: [10, 5]
    facing: "west"
    state: "in_combat"

# Items - healing support to keep fight viable
items:
  - type: "healing_potion"
    count: 4
    position: [2, 2]

# Player spawn configuration - baseline melee kit (no oaths, no special ammo)
player:
  position: [3, 6]
  facing: "east"
  inventory:
    - type: "healing_potion"
      count: 3
  equipment:
    weapon: "longsword"      # Standard baseline weapon
    armor: "leather_armor"   # Light armor

# Suite tags
suites: ["identity"]
