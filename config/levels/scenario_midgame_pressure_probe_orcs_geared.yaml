# Scenario: Midgame Pressure Probe (Orcs) — Geared Variant
# Purpose: Test depth 4 brute encounter with expected player gear.
#
# Design Intent:
#   This scenario reintroduces the orc brute that was removed from the
#   default-gear probe. The player has expected depth-4 gear (shortsword
#   instead of dagger/longsword) based on balance/gear_expectations.py.
#
#   If this probe lands within the depth 4 target band (15-30% death rate),
#   the brute BELONGS at depth 4 — the issue was always gear, not the brute.
#
#   Composition: 1x grunt, 1x brute, 1x skirmisher (3 total, no shaman)
#   Gear: shortsword + leather_armor (expected B1 gear at depth 4)
#
# Scenario is deterministic under seed_base=1337.

metadata:
  scenario_id: midgame_pressure_probe_orcs_geared
  family: orc_swarm
  depth: 4

scenario_id: midgame_pressure_probe_orcs_geared
name: "Midgame Pressure Probe (Orcs) — Geared"
description: "Gear-aware depth 4 probe: grunt + brute + skirmisher with expected B1 gear."

depth: 4

defaults:
  turn_limit: 120
  player_bot: "tactical_fighter"
  allow_player_death: true
  runs: 50

# Target band for depth 4: 15-30% death rate
expected:
  min_player_kills: 40
  max_player_deaths: 15

rooms:
  - id: "midgame_pressure_arena"
    type: "arena"
    width: 16
    height: 12
    description: "Open arena for midgame pressure testing (depth 4)"
    walls: "enclosed"

# Original composition minus shaman — brute reintroduced with expected gear
monsters:
  - type: "orc_grunt"
    count: 1
    position: [10, 6]
    facing: "west"
    state: "in_combat"

  - type: "orc_brute"
    count: 1
    position: [12, 7]
    facing: "west"
    state: "in_combat"

  - type: "orc_skirmisher"
    count: 1
    position: [10, 5]
    facing: "west"
    state: "in_combat"

items:
  - type: "healing_potion"
    count: 4
    position: [2, 2]

# Expected depth 4 gear from balance/gear_expectations.py:
#   Weapon: shortsword (B1 pity weapon, most common upgrade)
#   Armor: leather_armor (B1 armor — no meaningful upgrade available)
player:
  position: [3, 6]
  facing: "east"
  inventory:
    - type: "healing_potion"
      count: 3
  equipment:
    weapon: "shortsword"
    armor: "leather_armor"

suites: ["balance"]
