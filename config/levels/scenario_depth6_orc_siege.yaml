# Scenario: Depth 6 Orc Siege Probe
# Purpose: Diagnostic probe for depth 6 orc pressure data collection.
#
# Design Intent:
#   Open-arena composition probe for the depth pressure data pack.
#   Not a balance baseline — loose expectations to detect runaway scaling
#   only. Depth 6 uses 1.25x HP / 1.12x to-hit / 1.05x damage (DEFAULT_CURVE).
#
#   Composition: 2 orc grunts + 1 orc brute + 1 orc skirmisher (4 enemies total).
#   HP budget per run (scaled):
#     orc_grunt:      ceil(28 * 1.25) = 35  x2 = 70
#     orc_brute:      ceil(40 * 1.25) = 50  x1 = 50
#     orc_skirmisher: ceil(24 * 1.25) = 30  x1 = 30
#     TOTAL: 150 HP per run
#
#   At depth 6, increased to-hit and damage means substantially higher
#   monster lethality than depth 4. Death rate is expected to be high.
#   This probe is NOT intended to be bot-winnable most of the time.
#
#   Scenario is deterministic under seed_base=1337.

metadata:
  scenario_id: depth6_orc_siege
  family: orc_siege
  depth: 6

scenario_id: depth6_orc_siege
name: "Depth 6 – Orc Siege Probe"
description: "Mixed orc pressure probe at depth 6 for depth curve data collection (2 grunts + brute + skirmisher)."

depth: 6

defaults:
  turn_limit: 150
  player_bot: "tactical_fighter"
  allow_player_death: true
  runs: 50

# Phase 24 tuning: replaced brute with grunt (same pattern as depth 4 fix).
# Brute at 50 HP was creating grindy fights with H_PM=23 (target 10-13).
# Target band: 35-55% death rate at depth 6.
expected:
  min_player_kills: 30
  max_player_deaths: 28  # Target band ceiling: 55% death rate

rooms:
  - id: "depth6_siege_arena"
    type: "arena"
    width: 14
    height: 14
    description: "Open arena for depth 6 siege probe — no choke geometry to avoid pathing brittleness"
    walls: "enclosed"

# Phase 24 tuning iterations:
#   v1 (original): 2 grunts + brute + skirmisher → 92% death (brute H_PM=23)
#   v2: 3 grunts + skirmisher → 86% death (skirmisher anti-kiting + 3 bodies = tipping point)
#   v3: 2 grunts + skirmisher → 8% death (too easy)
#   v4 (current): 3 grunts (no skirmisher) — more bodies, no special abilities
# Composition: 3x grunt (3 total)
monsters:
  - type: "orc_grunt"
    count: 1
    position: [9, 5]
    facing: "west"
    state: "in_combat"
  - type: "orc_grunt"
    count: 1
    position: [9, 9]
    facing: "west"
    state: "in_combat"
  - type: "orc_grunt"
    count: 1
    position: [9, 7]
    facing: "west"
    state: "in_combat"

items:
  - type: "healing_potion"
    count: 2
    position: [2, 2]
  - type: "healing_potion"
    count: 2
    position: [2, 12]

player:
  position: [3, 7]
  facing: "east"
  inventory:
    - type: "healing_potion"
      count: 2
  equipment:
    weapon: "longsword"
    armor: "leather_armor"

suites: ["identity"]
